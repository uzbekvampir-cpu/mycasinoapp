<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Roulette Pro</title>
    <script src="https://telegram.org"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; background: #1a1a1a; color: white; margin: 0; padding: 10px; }
        .balance-container { font-size: 20px; font-weight: bold; color: #4cd137; margin: 10px 0; background: #2c3e50; padding: 10px; border-radius: 10px; }
        
        #wheel-container { position: relative; width: 300px; height: 300px; margin: 15px auto; }
        canvas { width: 100%; height: 100%; transition: transform 6s cubic-bezier(0.15, 0, 0.15, 1); border-radius: 50%; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        
        #pointer { position: absolute; top: -15px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 15px solid transparent; border-right: 15px solid transparent; border-top: 30px solid #ffd700; z-index: 10; }

        .controls { background: #2c3e50; padding: 15px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .input-group { display: flex; justify-content: space-around; margin-bottom: 10px; }
        input { width: 80px; padding: 10px; border-radius: 8px; border: none; font-size: 16px; text-align: center; background: #ecf0f1; }
        label { display: block; font-size: 12px; color: #bdc3c7; margin-bottom: 5px; text-transform: uppercase; }
        
        button { background: #4cd137; border: none; padding: 15px; font-size: 18px; color: white; font-weight: bold; border-radius: 12px; cursor: pointer; width: 100%; box-shadow: 0 4px #2bad1d; }
        button:active { transform: translateY(2px); box-shadow: 0 2px #2bad1d; }
        button:disabled { background: #7f8c8d; box-shadow: none; transform: none; opacity: 0.6; }
    </style>
</head>
<body>
    <div class="balance-container">Баланс: <span id="user-balance">Загрузка...</span> 💰</div>

    <div id="wheel-container">
        <div id="pointer"></div>
        <canvas id="canvas" width="500" height="500"></canvas>
    </div>

    <div class="controls">
        <div class="input-group">
            <div>
                <label>ЧИСЛО (0-36)</label>
                <input type="number" id="bet-number" min="0" max="36" value="1">
            </div>
            <div>
                <label>СТАВКА</label>
                <input type="number" id="bet-amount" min="10" step="10" value="100">
            </div>
        </div>
        <button id="spin-btn">КРУТИТЬ 🎰</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const btn = document.getElementById('spin-btn');
        const balanceEl = document.getElementById('user-balance');

        // Классическая европейская рулетка
        const sectors = [0, 32, 15, 19, 4, 21, 2, 25, 17, 34, 6, 27, 13, 36, 11, 30, 8, 23, 10, 5, 24, 16, 33, 1, 20, 14, 31, 9, 22, 18, 29, 7, 28, 12, 35, 3, 26];
        const arc = 2 * Math.PI / sectors.length;
        let currentRotation = 0;

        // Получаем баланс из URL (передадим из бота)
        const urlParams = new URLSearchParams(window.location.search);
        balanceEl.innerText = urlParams.get('balance') || '1000';

        function drawWheel() {
            const cx = 250, cy = 250, r = 240;
            ctx.clearRect(0, 0, 500, 500);
            
            sectors.forEach((num, i) => {
                const angle = i * arc;
                ctx.beginPath();
                ctx.fillStyle = num === 0 ? "#27ae60" : (i % 2 === 0 ? "#c0392b" : "#2c3e50");
                ctx.moveTo(cx, cy);
                ctx.arc(cx, cy, r, angle, angle + arc);
                ctx.fill();
                ctx.stroke();

                ctx.save();
                ctx.translate(cx, cy);
                ctx.rotate(angle + arc / 2);
                ctx.textAlign = "right";
                ctx.fillStyle = "white";
                ctx.font = "bold 18px Arial";
                ctx.fillText(num, r - 15, 8);
                ctx.restore();
            });
        }
        drawWheel();

        btn.addEventListener('click', () => {
            const num = parseInt(document.getElementById('bet-number').value);
            const amt = parseInt(document.getElementById('bet-amount').value);
            
            if (num < 0 || num > 36) return alert("Число от 0 до 36!");

            btn.disabled = true;
            const extraDegrees = 1800 + Math.floor(Math.random() * 360); 
            currentRotation += extraDegrees;
            canvas.style.transform = `rotate(${currentRotation}deg)`;

            setTimeout(() => {
                // Расчет числа под стрелкой (стрелка на 270 градусах)
                const realRotation = (currentRotation % 360);
                const sectorAngle = 360 / sectors.length;
                const winIdx = Math.floor(((360 - realRotation + 270) % 360) / sectorAngle);
                
                tg.sendData(JSON.stringify({
                    number: num,
                    amount: amt,
                    win: sectors[winIdx]
                }));
                btn.disabled = false;
            }, 6000);
        });
        tg.expand();
    </script>
</body>
</html>
