<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Roulette</title>
    <script src="https://telegram.org"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #1a1a1a; color: white; margin: 0; padding: 10px; overflow: hidden; }
        .balance-box { font-size: 22px; font-weight: bold; color: #4cd137; background: #2c3e50; padding: 10px; border-radius: 12px; margin-bottom: 10px; }
        #wheel-container { position: relative; width: 300px; height: 300px; margin: 10px auto; }
        canvas { width: 100%; height: 100%; transition: transform 6s cubic-bezier(0.15, 0, 0.2, 1); border-radius: 50%; }
        #pointer { position: absolute; top: -10px; left: 50%; transform: translateX(-50%); width: 0; height: 0; 
                    border-left: 15px solid transparent; border-right: 15px solid transparent; 
                    border-top: 30px solid #ffd700; z-index: 10; }
        .ui-panel { background: #2c3e50; padding: 15px; border-radius: 20px; }
        .row { display: flex; justify-content: space-around; margin-bottom: 15px; }
        input { width: 80px; padding: 10px; border-radius: 8px; border: none; font-size: 18px; text-align: center; }
        button { background: #4cd137; border: none; padding: 18px; font-size: 20px; color: white; font-weight: bold; border-radius: 15px; width: 100%; cursor: pointer; }
        button:disabled { background: #7f8c8d; }
    </style>
</head>
<body>
    <div class="balance-box">Баланс: <span id="val">1000</span> 💰</div>
    <div id="wheel-container">
        <div id="pointer"></div>
        <canvas id="canvas" width="500" height="500"></canvas>
    </div>
    <div class="ui-panel">
        <div class="row">
            <div><label>ЧИСЛО</label><br><input type="number" id="num" min="0" max="36" value="7"></div>
            <div><label>СТАВКА</label><br><input type="number" id="amt" min="10" value="100"></div>
        </div>
        <button id="spin">КРУТИТЬ 🎰</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const sectors = [0, 32, 15, 19, 4, 21, 2, 25, 17, 34, 6, 27, 13, 36, 11, 30, 8, 23, 10, 5, 24, 16, 33, 1, 20, 14, 31, 9, 22, 18, 29, 7, 28, 12, 35, 3, 26];
        const arc = 2 * Math.PI / sectors.length;
        let rotation = 0;

        const params = new URLSearchParams(window.location.search);
        document.getElementById('val').innerText = params.get('balance') || '1000';

        function draw() {
            const cx = 250, cy = 250, r = 240;
            sectors.forEach((num, i) => {
                const angle = i * arc;
                ctx.beginPath();
                ctx.fillStyle = num === 0 ? "#27ae60" : (i % 2 === 0 ? "#c0392b" : "#2c3e50");
                ctx.moveTo(cx, cy); ctx.arc(cx, cy, r, angle, angle + arc); ctx.fill();
                ctx.save(); ctx.translate(cx, cy); ctx.rotate(angle + arc / 2);
                ctx.textAlign = "right"; ctx.fillStyle = "#fff"; ctx.font = "bold 20px Arial";
                ctx.fillText(num, r - 20, 10); ctx.restore();
            });
        }
        draw();

        document.getElementById('spin').onclick = function() {
            this.disabled = true;
            const extra = 1800 + Math.floor(Math.random() * 360); 
            rotation += extra;
            canvas.style.transform = `rotate(${-rotation}deg)`;
            setTimeout(() => {
                const netRot = rotation % 360;
                const winIdx = Math.floor(((netRot + 270) % 360) / (360 / sectors.length));
                tg.sendData(JSON.stringify({
                    number: document.getElementById('num').value,
                    amount: document.getElementById('amt').value,
                    win: sectors[winIdx]
                }));
                this.disabled = false;
            }, 6000);
        };
        tg.expand();
    </script>
</body>
</html>
