<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Рулетка</title>
<style>
body { text-align:center; font-family: Arial; background:#222; color:#fff; }
#wheel-container { margin: 20px auto; width: 300px; height: 300px; position: relative; border-radius: 50%; border: 5px solid #fff; overflow: hidden; }
#wheel { position: absolute; width: 100%; height: 100%; transform: rotate(0deg); transition: transform 3s cubic-bezier(0.33, 1, 0.68, 1); }
.segment { position:absolute; width:50%; height:50%; top:50%; left:50%; transform-origin: 0 0; text-align:left; font-size:16px; }
input, button { font-size:18px; margin:5px; padding:5px; }
</style>
</head>
<body>
<h1>Мини-рулетка</h1>
<div id="wheel-container">
  <div id="wheel"></div>
</div>
<input type="number" id="number" placeholder="Число 0-36" min="0" max="36">
<input type="number" id="bet" placeholder="Ставка" min="1">
<br>
<button onclick="spin()">Сделать ставку</button>

<script>
const tg = window.Telegram.WebApp;
const wheel = document.getElementById("wheel");

// Создаем сегменты колеса
for(let i=0;i<=36;i++){
  const div = document.createElement("div");
  div.className="segment";
  div.style.transform = `rotate(${i*360/37}deg) translateX(-50%)`;
  div.textContent = i;
  wheel.appendChild(div);
}

function spin(){
  const number = document.getElementById("number").value;
  const bet = document.getElementById("bet").value;
  if(!number || !bet) return alert("Введите число и ставку!");

  const spins = 5 + Math.random()*5; // сколько оборотов
  const finalAngle = spins*360 + (36 - number)*(360/37);
  wheel.style.transform = `rotate(${finalAngle}deg)`;

  // Ждем анимацию и отправляем данные боту
  setTimeout(()=>{
    tg.sendData(JSON.stringify({number, bet}));
    alert("Ставка отправлена! Результат появится в чате.");
  }, 3000);
}
</script>
</body>
</html>
